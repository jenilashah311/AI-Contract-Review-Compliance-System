version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: contract_db
    environment:
      POSTGRES_USER: contract_user
      POSTGRES_PASSWORD: contract_pass
      POSTGRES_DB: contract_compliance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contract_user -d contract_compliance"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contract_backend
    environment:
      DATABASE_URL: postgresql://contract_user:contract_pass@postgres:5432/contract_compliance
      UPLOAD_DIR: /app/uploads
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      SIMILARITY_THRESHOLD: 0.55
      KEYWORD_MATCH_BONUS: 0.08
      MISSING_WEIGHT: 10
      CONFLICT_WEIGHT: 5
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: contract_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
